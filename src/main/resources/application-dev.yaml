spring:
  application:
    name: discodeit
  datasource:
    url: jdbc:h2:mem:library;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console # 접속 주소

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  aop:
    proxy-target-class: true

  boot:
    admin:
      client:
        url: http://localhost:9090

logging:
  level:
    com.sprint.mission.discodeit: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

server:
  port: 8080
