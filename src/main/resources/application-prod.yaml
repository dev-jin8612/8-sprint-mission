server:
  port: 8080

spring:
  application:
    name: discodeit
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234

  sql:
    init:
      mode: always
      schema-locations: classpath:schema2.sql

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL:http://localhost:9090}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: info
