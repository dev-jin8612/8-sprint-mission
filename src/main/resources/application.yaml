spring:
  application:
    name: discodeit

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

discodeit:
  storage:
    type: local
    local:
      root-path: .discodeit/storage

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
      base-path: /actuator
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: 황진서의 코드잇 과제
    version: 1.7.0
    spring-boot-version: 3.4.0
    java-version: ${java.version}

  datasource:
    url: ${spring.datasource.url:}
    driver-class-name: ${spring.datasource.driver-class-name:}

  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto:}

  storage:
    type: ${discodeit.storage.type}
    path: ${discodeit.storage.local.root-path}

  multipart:
    max-file-size: ${spring.servlet.multipart.max-file-size}
    max-request-size: ${spring.servlet.multipart.max-request-size}
