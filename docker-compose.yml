version: '3.8'

services:
  # 1. Reverse Proxy (Nginx)
  reverse-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: discodeit-proxy
    ports:
      - "3000:80" # 외부와 통신하는 유일한 관문
    depends_on:
      - backend
    networks:
      - proxy-network

  # 2. Backend (Spring Boot) - 기존 app과 backend를 하나로 통합
  backend:
    build:
      context: . # 현재 폴더의 Dockerfile 사용 (기존 app 설정 유지)
      dockerfile: Dockerfile
    container_name: discodeit-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      
      # DB 연결 정보 (아래 db 컨테이너와 연결)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${RDS_DATABASE:-menudb}
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD:-postgres}
      
      # Redis, Kafka 연결 정보
      SPRING_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      
      # 프로젝트 정보/JVM 옵션
      PROJECT_NAME: ${PROJECT_NAME:-discodeit}
      PROJECT_VERSION: ${PROJECT_VERSION:-1.2-M8}
      JVM_OPTS: ${JVM_OPTS:-}
      TZ: "Asia/Seoul"
    volumes:
      - binary-content-data:/app/.binary-content
    networks:
      - proxy-network
      - infra-network
    # ports 매핑 삭제: Nginx를 통해서만 접근하도록 완전히 내부망으로 숨김

  # 3. Database (PostgreSQL) - 기존 postgres와 db를 하나로 통합
  db:
    image: postgres:17
    container_name: discodeit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RDS_DATABASE:-menudb}
      POSTGRES_USER: ${RDS_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${RDS_PASSWORD:-postgres}
      TZ: "Asia/Seoul"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${RDS_USERNAME:-postgres} -d ${RDS_DATABASE:-menudb}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - infra-network
    # ports 매핑 삭제: 외부 접근 차단

  # 4. Memory DB (Redis)
  redis:
    image: redis:7-alpine
    container_name: discodeit-redis
    networks:
      - infra-network

  # 5. Message Broker (Kafka & Zookeeper) - Confluent 이미지로 교체
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: discodeit-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - infra-network
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: discodeit-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - infra-network

networks:
  proxy-network:
  infra-network:
    internal: true # 외부망과 완전히 차단된 내부 전용 네트워크

volumes:
  postgres_data:
    driver: local
    name: discodeit-postgres-data
  binary-content-data:
    driver: local
    name: discodeit-binary-content