name: deploy

on:
  push:
    branches:
      - "황진서-sprint8"

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Docker Image (Private ECR)
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ vars.ECR_REPOSITORY_URI }}:$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (ECR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR (private)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (latest + commit sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.ECR_REPOSITORY_URI }}:latest
            ${{ vars.ECR_REPOSITORY_URI }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-ecs:
    name: Update ECS Service
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (ECS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_DEFINITION }}" \
            --query taskDefinition \
            --output json > taskdef.json

      - name: Render new task definition with new image
        env:
          NEW_IMAGE: ${{ needs.build-and-push.outputs.image_uri }}
          CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
        run: |
          jq --arg IMAGE "$NEW_IMAGE" --arg NAME "$CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (
                .containerDefinitions
                | map(if .name == $NAME then .image = $IMAGE else . end)
              )
          ' taskdef.json > taskdef-new.json

      - name: Register new task definition revision
        id: register
        run: |
          NEW_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-new.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)"
          echo "task_def_arn=${NEW_TD_ARN}" >> "$GITHUB_OUTPUT"

      - name: Scale down service to 0
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --desired-count 0
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      - name: Update service to new task definition and scale up
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --desired-count 1 \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"