name: deploy

on:
  push:
    branches:
      - 황진서-sprint8

jobs:
  build-and-push:
    name: Build & Push Docker Image (Public ECR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Public ECR 배포용: us-east-1 고정
      - name: Configure AWS credentials (Public ECR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build & Push (latest + commit sha)
        env:
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GIT_SHA::7}"

          docker build \
            -t "${ECR_REPOSITORY_URI}:latest" \
            -t "${ECR_REPOSITORY_URI}:${SHORT_SHA}" \
            .

          docker push "${ECR_REPOSITORY_URI}:latest"
          docker push "${ECR_REPOSITORY_URI}:${SHORT_SHA}"

  update-ecs:
    name: Update ECS Service
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # ECS 접근용: AWS_REGION 사용
      - name: Configure AWS credentials (ECS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch current task definition
        env:
          ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query taskDefinition \
            --output json > taskdef.json

      - name: Render new task definition with new image
        env:
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GIT_SHA::7}"
          NEW_IMAGE="${ECR_REPOSITORY_URI}:${SHORT_SHA}"

          # 불필요/등록 불가 필드 제거 + 이미지 교체
          jq --arg IMAGE "$NEW_IMAGE" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions[0].image = $IMAGE
          ' taskdef.json > taskdef-new.json

      - name: Register new task definition revision
        id: register
        run: |
          NEW_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-new.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)"
          echo "task_def_arn=${NEW_TD_ARN}" >> $GITHUB_OUTPUT

      # 프리티어 고려: 기존 서비스 desired-count=0으로 중단
      - name: Scale down service to 0
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --desired-count 0

      - name: Wait for service stable (scaled down)
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Update service to new task definition and scale up
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          NEW_TASK_DEF_ARN: ${{ steps.register.outputs.task_def_arn }}
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --desired-count 1 \
            --force-new-deployment

      - name: Wait for service stable (deployed)
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"